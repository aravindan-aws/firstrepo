name: Workflow Test

on: 
    push:
        branches:
          - main
    pull_request:
      branches:
        - main
env:
  name: "Aravind"

jobs:
  First-Job:
    runs-on: ubuntu-latest
    steps:  
    - name: Welcome Message
      run: echo "Welcome" ${{ env.name }} "to My Workflow!"

  Second-Job:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        python-version: [3.12, 3.10]
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Read File
      run: cat README.md

    - name: Python Setup of ${{ matrix.python-version }} version
      continue-on-error: true
      uses: actions/setup-python@v7
      with:
        python-version: $ {{ matrix.python-version }}

    - name: Version Check
      run: python --version

  Third-Job:
    runs-on: ubuntu-latest
    needs: [Second-Job, First-Job]
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Write File
      run: echo "This is a test file" > test.txt

    - name: Artifact Upload
      uses: actions/upload-artifact@v7
      with:
        name: test-artifact
        path: test.txt