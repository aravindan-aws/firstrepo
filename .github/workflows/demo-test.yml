name: Workflow Test

on: 
    push:
        branches:
          - main
    pull_request:
      branches:
        - main

jobs:
  First-Job:
    runs-on: ubuntu-latest
    steps:  
    - name: Welcome Message
      run: echo "Welcome to My Workflow!"

  Second-Job:
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        python-version: [3.13, 3.11]  
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Read File
      run: cat README.md

    - name: Python Setup of ${{ matrix.python-version }} version
      uses: actions/setup-python@v7
      continue-on-error: true
      with:
        python-version: $ {{ matrix.python-version }}

    - name: Version Check
      run: python --version

  Third-Job:
    runs-on: ubuntu-latest
    needs: [Second-Job, First-Job]
    if: github.ref == 'refs/heads/feature-*'
    steps:
    - name: Checkout
      uses: actions/checkout@v7

    - name: Read File if it is in Respective Branch
      run: cat README.md